  - title: "The Economic Geography of Talent: Evidence from the China Initiative"
    authors: with Ningyuan Jia and Jia Yang
  # pdf: https://sunhamkim.github.io/files/pdf/HanKim.pdf
  # status: UCLA Ziman Center WP No. 2023-13
   abstract: "This project examines how the China Initiative, a U.S. national security policy launched in 2018, reshaped the spatial distribution of Chinese-born researchers and skilled workers across firms and regions. Using online job postings, publication, and patent data, we analyze how heightened scrutiny prompted worker relocation across firms and regions, and reduced collaboration between U.S. and China-affiliated institutions. The project explores how geopolitical tensions and policy uncertainty reshape the geography of talent and innovation."
